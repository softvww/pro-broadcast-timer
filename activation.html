<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videowaves Pro Timer - Activation Required</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050812;
            --primary-color: #007aff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 122, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(88, 86, 214, 0.15), transparent 25%);
        }
        .container {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 16px;
            width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            letter-spacing: 2px;
        }
        p {
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .machine-id-box {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .machine-id {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem;
            color: #00ffcc;
            letter-spacing: 1px;
            word-break: break-all;
        }
        .label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--primary-color);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #005bb5;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error-msg {
            color: #ff3b30;
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VIDEOWAVES PRO</h1>
        <p>This software is protected. Enter your License Key (sent to your email) to activate.</p>

        <div class="machine-id-box">
            <span class="label">Your Machine ID</span>
            <div class="machine-id" id="machineIdDisplay">Loading...</div>
        </div>

        <span class="label" style="text-align: left; margin-bottom: 10px;">License Key</span>
        <input type="text" id="licenseKeyInput" placeholder="VW-XXXX-XXXX-XXXX">
        
        <button id="activateBtn">ACTIVATE SOFTWARE</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Replace with your Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "123456789",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', async () => {
            const machineIdDisplay = document.getElementById('machineIdDisplay');
            const licenseKeyInput = document.getElementById('licenseKeyInput');
            const activateBtn = document.getElementById('activateBtn');
            const errorMsg = document.getElementById('errorMsg');

            let machineId = "DEV-MODE-ID";
            if (window.electronAPI) {
                machineId = await window.electronAPI.getMachineId();
            }
            machineIdDisplay.textContent = machineId;

            // Auto-check saved license
            const savedKey = localStorage.getItem('vw_license_key');
            if (savedKey) {
                licenseKeyInput.value = savedKey;
                activateBtn.click(); // auto-verify
            }

            let unsubscribe = null; // for realtime listener

            activateBtn.addEventListener('click', async () => {
                errorMsg.textContent = '';
                const key = licenseKeyInput.value.trim();
                
                if(!key) {
                    errorMsg.textContent = 'Please enter a valid License Key.';
                    return;
                }

                activateBtn.textContent = 'VERIFYING...';
                activateBtn.disabled = true;

                try {
                    const docRef = doc(db, "licenses", key);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        if (data.status !== "active") {
                            showError("License is deactivated or suspended.");
                            return;
                        }

                        // If machineId is empty or matches this laptop, allow
                        if (!data.machineId || data.machineId === machineId) {
                            // Update Firestore to lock to this machine
                            await setDoc(docRef, { machineId: machineId }, { merge: true });
                            
                            localStorage.setItem('vw_license_key', key);
                            
                            activateBtn.style.background = '#34c759';
                            activateBtn.textContent = 'ACTIVATED!';

                            // Start listening for changes (if another laptop logs in)
                            if (unsubscribe) unsubscribe();
                            unsubscribe = onSnapshot(docRef, (snapshot) => {
                                const currentData = snapshot.data();
                                if (currentData && currentData.machineId !== machineId) {
                                    // Another device logged in using this key!
                                    alert("Session Ended: Your License Key was activated on another laptop.");
                                    localStorage.removeItem('vw_license_key');
                                    // App logic to close/reload would go here
                                    // In Electron, we can tell the main process to exit or reload
                                    window.close(); 
                                }
                            });

                            setTimeout(() => {
                                if (window.electronAPI) {
                                    window.electronAPI.activationSuccess();
                                }
                            }, 1000);
                        } else {
                            // The key is being used by another machine, but they just entered it here
                            // So we TRANSFER the license to this machine!
                            // This means the other machine will get the 'onSnapshot' trigger and get kicked out!
                            
                            const confirmTransfer = confirm(`This License is already active on another machine.\nDo you want to transfer it to this laptop? (The other laptop will be logged out)`);
                            
                            if (confirmTransfer) {
                                await setDoc(docRef, { machineId: machineId }, { merge: true });
                                localStorage.setItem('vw_license_key', key);
                                
                                activateBtn.style.background = '#34c759';
                                activateBtn.textContent = 'TRANSFERRED!';

                                setTimeout(() => {
                                    if (window.electronAPI) {
                                        window.electronAPI.activationSuccess();
                                    }
                                }, 1000);
                            } else {
                                showError("Transfer cancelled.");
                            }
                        }

                    } else {
                        showError("Invalid License Key. Not found in database.");
                    }

                } catch (e) {
                    console.error(e);
                    showError("Network error. Could not connect to licensing server.");
                }
            });

            function showError(msg) {
                errorMsg.textContent = msg;
                activateBtn.disabled = false;
                activateBtn.textContent = 'ACTIVATE SOFTWARE';
                activateBtn.style.background = '';
            }
        });
    </script>
</body>
</html>

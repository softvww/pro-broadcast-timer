<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
        }
        .logo-container {
            position: relative;
            text-align: center;
        }
        h1 {
            font-size: 48px;
            letter-spacing: 8px;
            margin: 0;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1.5s ease-out;
        }
        .sub {
            font-size: 14px;
            color: #666;
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            animation: fadeIn 2.5s ease-out;
        }
        .loader {
            width: 200px;
            height: 2px;
            background: #222;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .loader::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            animation: loading 2s infinite ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>VIDEOWAVES</h1>
        <div class="sub">Professional Broadcast Tools</div>
        <div class="loader"></div>
    </div>
</body>
</html>

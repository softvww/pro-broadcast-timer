<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Videowaves Timer — Remote Control</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #080c14; --card: #0e1623; --cyan: #00d4ff;
    --green: #34c759; --red: #ff3b30; --orange: #ff9500;
    --purple: #bf5af2; --muted: #7a8799; --text: #e8edf5;
  }
  body {
    font-family: -apple-system, 'Outfit', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column;
  }

  /* HEADER */
  .header {
    background: #0a1020; border-bottom: 1px solid rgba(0,212,255,0.15);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .brand { font-size: 1rem; font-weight: 800; letter-spacing: 2px; }
  .brand span { color: var(--cyan); }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--muted);
    display: inline-block; margin-right: 6px; transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .conn-label { font-size: 0.78rem; color: var(--muted); display: flex; align-items: center; }

  /* TIMER DISPLAY */
  .timer-panel {
    background: linear-gradient(180deg, #050810 0%, #0a1020 100%);
    padding: 32px 20px 24px; text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .live-badge {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 3px;
    color: var(--red); margin-bottom: 10px;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-badge.standby { color: var(--muted); animation: none; }
  .live-badge.paused  { color: var(--orange); animation: none; }

  .time-display {
    font-size: clamp(3.5rem, 20vw, 7rem); font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff; line-height: 1;
    text-shadow: 0 0 40px rgba(0,212,255,0.4);
    letter-spacing: 4px; margin-bottom: 8px;
  }
  .time-label { font-size: 0.75rem; letter-spacing: 5px; color: var(--muted); font-weight: 600; }

  /* SET TIME */
  .set-time-panel {
    padding: 20px; background: var(--card);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .set-time-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; text-align: center; }
  .time-inputs { display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 14px; }
  .time-input-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .time-input-group label { font-size: 0.68rem; color: var(--muted); letter-spacing: 1px; }
  .time-input-group input {
    width: 70px; background: #080c14; border: 1px solid rgba(0,212,255,0.2);
    color: #fff; font-size: 1.6rem; font-weight: 700; text-align: center;
    border-radius: 10px; padding: 10px 6px;
    font-variant-numeric: tabular-nums;
    outline: none;
  }
  .time-input-group input:focus { border-color: var(--cyan); }
  .time-sep { font-size: 1.8rem; color: var(--muted); font-weight: 700; margin-top: 12px; }
  .set-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
    color: var(--cyan); font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; transition: background 0.2s;
  }
  .set-btn:active { background: rgba(0,212,255,0.25); }

  /* MAIN CONTROLS */
  .controls { padding: 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; }

  .ctrl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ctrl-btn {
    padding: 22px 12px; border-radius: 16px; border: none;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: transform 0.1s, opacity 0.2s;
    font-family: -apple-system, 'Outfit', sans-serif;
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn .btn-icon { font-size: 1.6rem; }

  .btn-start  { background: linear-gradient(135deg, #1a4a2a, #0d3a1e); color: var(--green); border: 1px solid rgba(52,199,89,0.3); }
  .btn-stop   { background: linear-gradient(135deg, #3a2a10, #2a1a05); color: var(--orange); border: 1px solid rgba(255,149,0,0.3); }
  .btn-reset  { background: linear-gradient(135deg, #3a1a1a, #2a0d0d); color: var(--red); border: 1px solid rgba(255,59,48,0.3); }
  .btn-broadcast { background: linear-gradient(135deg, #1a1a3a, #0d0d2a); color: var(--purple); border: 1px solid rgba(191,90,242,0.3); }
  .btn-holding   { background: linear-gradient(135deg, #2a1a3a, #1a0d2a); color: #7b5ea7; border: 1px solid rgba(123,94,167,0.3); }

  .ctrl-btn.full { grid-column: 1 / -1; }

  /* PRESETS */
  .presets-section { padding: 0 20px 20px; }
  .presets-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; }
  .presets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .preset-btn {
    padding: 14px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
    background: var(--card); color: var(--text); font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    font-family: -apple-system, 'Outfit', sans-serif;
  }
  .preset-btn:active { background: rgba(0,212,255,0.15); border-color: var(--cyan); color: var(--cyan); transform: scale(0.95); }

  /* PUSH MESSAGE */
  .push-section { padding: 0 20px 28px; }
  .push-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; }
  .push-row { display: flex; gap: 10px; }
  .push-input {
    flex: 1; background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; border-radius: 10px; padding: 12px 14px; font-size: 0.95rem;
    outline: none; font-family: -apple-system, 'Outfit', sans-serif;
  }
  .push-input:focus { border-color: var(--cyan); }
  .push-send {
    padding: 12px 18px; background: linear-gradient(135deg,#00b4d8,#0077b6);
    border: none; border-radius: 10px; color: #fff; font-weight: 700;
    font-size: 0.9rem; cursor: pointer;
    font-family: -apple-system, 'Outfit', sans-serif;
  }
  .push-send:active { opacity: 0.8; }

  /* FOOTER */
  .footer { text-align: center; padding: 12px; color: var(--muted); font-size: 0.72rem; border-top: 1px solid rgba(255,255,255,0.04); }

  /* OFFLINE OVERLAY */
  .offline-overlay {
    position: fixed; inset: 0; background: rgba(8,12,20,0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; gap: 16px; padding: 32px; text-align: center;
    transition: opacity 0.3s;
  }
  .offline-overlay.hidden { display: none; }
  .offline-icon { font-size: 3rem; }
  .offline-title { font-size: 1.4rem; font-weight: 800; }
  .offline-sub { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
  .reconnect-btn {
    margin-top: 12px; padding: 14px 32px; border-radius: 12px;
    background: var(--cyan); border: none; color: #000; font-weight: 700;
    font-size: 1rem; cursor: pointer;
    font-family: -apple-system, 'Outfit', sans-serif;
  }
</style>
</head>
<body>

<!-- OFFLINE OVERLAY -->
<div class="offline-overlay" id="offline-overlay">
  <div class="offline-icon">📡</div>
  <div class="offline-title">Connecting...</div>
  <div class="offline-sub">Connecting to Videowaves Timer at<br><strong id="server-address-display">__SERVER_IP__:__SERVER_PORT__</strong></div>
  <div id="error-log" style="color: #ff3b30; font-size: 0.8rem; margin-top: 8px;"></div>
  <button class="reconnect-btn" onclick="connect()">Reconnect</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="brand">VIDEO<span>WAVES</span></div>
  <div class="conn-label">
    <span class="status-dot" id="status-dot"></span>
    <span id="conn-text">Connecting…</span>
  </div>
</div>

<!-- TIMER DISPLAY -->
<div class="timer-panel">
  <div class="live-badge standby" id="live-badge">● STANDBY</div>
  <div class="time-display" id="time-display">05:00</div>
  <div class="time-label">COUNTDOWN</div>
</div>

<!-- SET TIME -->
<div class="set-time-panel">
  <div class="set-time-label">SET TIME</div>
  <div class="time-inputs">
    <div class="time-input-group">
      <label>HRS</label>
      <input type="number" id="inp-h" value="0" min="0" max="23">
    </div>
    <div class="time-sep">:</div>
    <div class="time-input-group">
      <label>MIN</label>
      <input type="number" id="inp-m" value="5" min="0" max="59">
    </div>
    <div class="time-sep">:</div>
    <div class="time-input-group">
      <label>SEC</label>
      <input type="number" id="inp-s" value="0" min="0" max="59">
    </div>
  </div>
  <button class="set-btn" onclick="setTime()">⏱ SET TIME & RESET</button>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="ctrl-row">
    <button class="ctrl-btn btn-start" onclick="send('/timer/start')">
      <span class="btn-icon">▶</span> START
    </button>
    <button class="ctrl-btn btn-stop" onclick="send('/timer/stop')">
      <span class="btn-icon">⏸</span> PAUSE
    </button>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn btn-reset" onclick="send('/timer/reset')">
      <span class="btn-icon">↺</span> RESET
    </button>
    <button class="ctrl-btn btn-holding" onclick="send('/timer/holding')">
      <span class="btn-icon">🎭</span> HOLDING
    </button>
  </div>
</div>

<!-- PRESETS -->
<div class="presets-section">
  <div class="presets-label">QUICK PRESETS</div>
  <div class="presets-grid">
    <button class="preset-btn" onclick="setPreset(5)">5m</button>
    <button class="preset-btn" onclick="setPreset(10)">10m</button>
    <button class="preset-btn" onclick="setPreset(15)">15m</button>
    <button class="preset-btn" onclick="setPreset(20)">20m</button>
    <button class="preset-btn" onclick="setPreset(30)">30m</button>
    <button class="preset-btn" onclick="setPreset(45)">45m</button>
    <button class="preset-btn" onclick="setPreset(60)">60m</button>
    <button class="preset-btn" onclick="setPreset(90)">90m</button>
  </div>
</div>

<!-- PUSH MESSAGE -->
<div class="push-section">
  <div class="push-label">PUSH MESSAGE TO SCREEN</div>
  <div class="push-row">
    <input class="push-input" type="text" id="push-input" placeholder="Type message…">
    <button class="push-send" onclick="pushMsg()">📣 Send</button>
  </div>
</div>

<div class="footer">Videowaves Timer · Network Control · __SERVER_IP__:__SERVER_PORT__</div>

<script>
  const SERVER = `ws://${window.location.host}`;
  let ws, reconnectTimer;

  function connect() {
    if (ws) { try { ws.close(); } catch(e){} }
    ws = new WebSocket(SERVER);

    ws.onopen = () => {
      document.getElementById('offline-overlay').classList.add('hidden');
      document.getElementById('status-dot').classList.add('connected');
      document.getElementById('conn-text').textContent = 'Connected';
      document.getElementById('error-log').textContent = '';
    };

    ws.onmessage = (e) => {
      try {
        const state = JSON.parse(e.data);
        if (state.display) document.getElementById('time-display').textContent = state.display;
        if (state.status !== undefined) updateBadge(state.status);
      } catch(err) {}
    };

    ws.onerror = (err) => {
        document.getElementById('error-log').textContent = 'Error: Connection failed';
    };

    ws.onclose = () => {
      document.getElementById('offline-overlay').classList.remove('hidden');
      document.getElementById('status-dot').classList.remove('connected');
      document.getElementById('conn-text').textContent = 'Disconnected';
      document.getElementById('server-address-display').textContent = window.location.host;
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 3000);
    };
  }

  function send(address, args) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ address, args: args || [] }));
    }
  }

  function setTime() {
    const h = parseInt(document.getElementById('inp-h').value) || 0;
    const m = parseInt(document.getElementById('inp-m').value) || 0;
    const s = parseInt(document.getElementById('inp-s').value) || 0;
    send('/timer/set-hms', [h, m, s]);
  }

  function setPreset(minutes) {
    document.getElementById('inp-h').value = 0;
    document.getElementById('inp-m').value = minutes;
    document.getElementById('inp-s').value = 0;
    send('/timer/set', [minutes]);
  }

  function pushMsg() {
    const msg = document.getElementById('push-input').value.trim();
    if (msg) { send('/timer/push', [msg]); document.getElementById('push-input').value = ''; }
  }

  function updateBadge(status) {
    const badge = document.getElementById('live-badge');
    badge.className = 'live-badge';
    if (status === 'running') { badge.textContent = '● LIVE'; badge.classList.add('running'); }
    else if (status === 'paused') { badge.textContent = '⏸ PAUSED'; badge.classList.add('paused'); }
    else { badge.textContent = '● STANDBY'; badge.classList.add('standby'); }
  }

  document.getElementById('push-input').addEventListener('keydown', e => { if (e.key === 'Enter') pushMsg(); });
  connect();
</script>
</body>
</html>
